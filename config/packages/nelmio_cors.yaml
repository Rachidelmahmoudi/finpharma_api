nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['*']  # ← En dev, autoriser tout
        allow_credentials: false
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        allow_headers: ['*']  # ← Autoriser tous les headers
        expose_headers: ['Link', 'X-Total-Count']
        max_age: 3600
    paths:
        '^/': 
            allow_origin: ['*']
            allow_headers: ['*']
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
